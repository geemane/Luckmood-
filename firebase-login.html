<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luckmood - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            max-width: 400px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .auth-box {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
        }

        .auth-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 14px;
            padding: 14px 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-input:focus {
            border-color: rgba(255, 255, 255, 0.6);
        }

        .submit-btn {
            width: 100%;
            background-color: #fff;
            color: #000;
            border: none;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
        }

        .submit-btn:hover {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toggle-text {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
        }

        .toggle-link {
            color: #fff;
            text-decoration: underline;
            cursor: pointer;
            margin-left: 4px;
        }

        .toggle-link:hover {
            opacity: 0.7;
        }

        .error-message {
            background-color: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background-color: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            color: #0f0;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .user-info {
            display: none;
            text-align: center;
        }

        .user-info.show {
            display: block;
        }

        .user-email {
            font-size: 16px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .logout-btn {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .logout-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>LUCKMOOD</h1>
        </div>

        <!-- Login/Signup Form -->
        <div class="auth-box" id="authBox">
            <h2 class="auth-title" id="authTitle">Sign In</h2>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="authForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input 
                        type="email" 
                        class="form-input" 
                        id="email" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input 
                        type="password" 
                        class="form-input" 
                        id="password" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
            </form>

            <div class="toggle-text">
                <span id="togglePrompt">Don't have an account?</span>
                <span class="toggle-link" id="toggleLink">Sign Up</span>
            </div>
        </div>

        <!-- User Info (shown after login) -->
        <div class="user-info" id="userInfo">
            <h2 class="auth-title">Welcome Back!</h2>
            <p class="user-email" id="userEmail"></p>
            <button class="logout-btn" id="logoutBtn">Log Out</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword,
            signOut,
            onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        // Firebase configuration for Luckmood
        const firebaseConfig = {
            apiKey: "AIzaSyDHZHvUbPDFVy2vsJytXVxZs2_71ku7yAs",
            authDomain: "luckmoodco.firebaseapp.com",
            projectId: "luckmoodco",
            storageBucket: "luckmoodco.firebasestorage.app",
            messagingSenderId: "39836047342",
            appId: "1:39836047342:web:60af72535d8f2a933160ff",
            measurementId: "G-H0GWYX3MXB"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // DOM elements
        const authForm = document.getElementById('authForm');
        const authBox = document.getElementById('authBox');
        const userInfo = document.getElementById('userInfo');
        const authTitle = document.getElementById('authTitle');
        const submitBtn = document.getElementById('submitBtn');
        const togglePrompt = document.getElementById('togglePrompt');
        const toggleLink = document.getElementById('toggleLink');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const userEmail = document.getElementById('userEmail');
        const logoutBtn = document.getElementById('logoutBtn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        let isSignUp = false;

        // Toggle between Sign In and Sign Up
        toggleLink.addEventListener('click', () => {
            isSignUp = !isSignUp;
            
            if (isSignUp) {
                authTitle.textContent = 'Create Account';
                submitBtn.textContent = 'Sign Up';
                togglePrompt.textContent = 'Already have an account?';
                toggleLink.textContent = 'Sign In';
            } else {
                authTitle.textContent = 'Sign In';
                submitBtn.textContent = 'Sign In';
                togglePrompt.textContent = "Don't have an account?";
                toggleLink.textContent = 'Sign Up';
            }
            
            hideMessages();
        });

        // Handle form submission
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value;
            const password = passwordInput.value;
            
            hideMessages();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Loading...';
            
            try {
                if (isSignUp) {
                    // Sign up new user
                    await createUserWithEmailAndPassword(auth, email, password);
                    showSuccess('Account created successfully! Welcome to Luckmood.');
                } else {
                    // Sign in existing user
                    await signInWithEmailAndPassword(auth, email, password);
                    showSuccess('Welcome back!');
                }
                
                // Clear form
                emailInput.value = '';
                passwordInput.value = '';
                
            } catch (error) {
                showError(getErrorMessage(error.code));
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isSignUp ? 'Sign Up' : 'Sign In';
            }
        });

        // Handle logout
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                showSuccess('Logged out successfully');
            } catch (error) {
                showError('Error logging out');
            }
        });

        // Check auth state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in
                authBox.style.display = 'none';
                userInfo.classList.add('show');
                userEmail.textContent = user.email;
            } else {
                // User is signed out
                authBox.style.display = 'block';
                userInfo.classList.remove('show');
            }
        });

        // Helper functions
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 3000);
        }

        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }

        function getErrorMessage(errorCode) {
            switch (errorCode) {
                case 'auth/email-already-in-use':
                    return 'This email is already registered. Try signing in instead.';
                case 'auth/invalid-email':
                    return 'Invalid email address.';
                case 'auth/weak-password':
                    return 'Password should be at least 6 characters.';
                case 'auth/user-not-found':
                    return 'No account found with this email.';
                case 'auth/wrong-password':
                    return 'Incorrect password.';
                case 'auth/too-many-requests':
                    return 'Too many attempts. Try again later.';
                default:
                    return 'An error occurred. Please try again.';
            }
        }
    </script>
</body>
</html>
